# E7 showcase: two armed territorial species contesting one central grazing
# corridor, plus a neutral communicator commune as alliance candidate.
# Expect WarOrRaid on the contested border (and WarEnded if one side is
# driven off), AllianceFormed between the culture-sharing communes, and
# KinNetworkStable in the tight territorial herds.
