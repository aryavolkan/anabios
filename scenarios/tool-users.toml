name = "tool-users"
seed = 60623

# E6 showcase: an innovator commune adjacent to a hunter pack. The commune
# (40 high-Openness communicators) climbs the invention tree fast; the
# adjacent fast_hunters (Weapon + Communicator) pick Metalworking up through
# social diffusion and put it to work — tool-boosted kills (EvolvedTool).
# Hunting persists into the overlap window because the small pack can't
# corner the whole herd.
inventions_enabled = true
max_population = 1000

# Prey: a grazer herd at world center.
[[agents]]
count = 80
archetype = "grazer"
placement = { kind = "cluster", center_x = 512.0, center_y = 512.0, radius = 140.0 }
[agents.traits]
lifespan_bias = 1.0

# Innovator commune: grazes and invents, west side of the herd.
[[agents]]
count = 60
archetype = "communicator"
placement = { kind = "cluster", center_x = 430.0, center_y = 512.0, radius = 70.0 }
[agents.traits]
lifespan_bias = 1.0
openness = 1.0

# Hunter pack: armed cultural hunters, east side — in diffusion range.
[[agents]]
count = 12
archetype = "fast_hunter"
placement = { kind = "cluster", center_x = 594.0, center_y = 512.0, radius = 70.0 }
[agents.traits]
lifespan_bias = 1.0
openness = 0.9
